          in: query
          description: Page number (starting from 1)
          schema:
            example: 1
            type: number
        - name: limit
          required: false
          in: query
          description: Number of items per page
          schema:
            example: 10
            type: number
        - name: sortBy
          required: false
          in: query
          description: The field to sort by
          schema:
            example: name
            enum:
              - id
              - name
              - description
            type: string
        - name: order
          required: false
          in: query
          description: Sorting direction
          schema:
            example: DESC
            enum:
              - ASC
              - DESC
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              examples:
                Without pagination:
                  value:
                    - id: f3d2f4c6-5376-48df-b4a7-9fe825559db9
                      name: string
                      description: string
                  description: Without page and limit query parameters
                With pagination:
                  value:
                    total: 1
