openapi: 3.0.0
paths:
  /:
    get:
      operationId: AppController_getHello
      parameters: []
      responses:
        '200':
          description: ''
  /user:
    post:
      operationId: UserController_create
      summary: Create user
      description: Creates a new user
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserDto'
      responses:
        '201':
          description: The user has been created
          content:
            application/json:
              example:
                id: b1b73593-2445-421a-af42-359114d6c536
                login: string
                role: admin
                createdAt: 1775287579998
                updatedAt: 1775287579998
        '400':
          description: Bad request. Body does not contain required fields
      tags:
        - Users
    get:
      operationId: UserController_findAll
      summary: Get all users
      description: Gets all users. Supports pagination and sorting
      parameters:
        - name: page
          required: false
          in: query
          description: Page number (starting from 1)
          schema:
            example: 1
            type: number
        - name: limit
          required: false
          in: query
          description: Number of items per page
          schema:
            example: 10
            type: number
        - name: sortBy
          required: false
          in: query
          description: The field to sort by
          schema:
            example: login
            enum:
              - id
              - login
              - role
              - createdAt
              - updatedAt
            type: string
        - name: order
          required: false
          in: query
          description: Sorting direction
          schema:
            example: DESC
            enum:
              - ASC
              - DESC
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              examples:
                Without pagination:
                  value:
                    - id: b1b73593-2445-421a-af42-359114d6c536
                      login: string
                      role: admin
                      createdAt: 1775287579998
                      updatedAt: 1775287579998
                  description: Without page and limit query parameters
                With pagination:
                  value:
                    total: 1
                    page: 1
                    limit: 10
                    data:
                      - id: b1b73593-2445-421a-af42-359114d6c536
                        login: string
                        role: admin
                        createdAt: 1775287579998
                        updatedAt: 1775287579998
                  description: With page and limit query parameters
        '400':
          description: Bad request. Wrong query parameters (hacker scope)
      tags:
        - Users
  /user/{id}:
    get:
      operationId: UserController_findOne
      summary: Get single user by id
      description: Get single user by id
      parameters:
        - name: id
          required: true
          in: path
          description: User id, format UUID v4
          schema: {}
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              example:
                id: b1b73593-2445-421a-af42-359114d6c536
                login: string
                role: admin
                createdAt: 1775287579998
                updatedAt: 1775287579998
        '400':
          description: Bad request. User id is invalid (not uuid)
        '404':
          description: User not found
      tags:
        - Users
    put:
      operationId: UserController_update
      summary: Update a user's password
      description: Updates a user's password by ID
      parameters:
        - name: id
          required: true
          in: path
          description: User id, format UUID v4
          schema: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePasswordDto'
      responses:
        '200':
          description: The user has been updated
          content:
            application/json:
              example:
                id: b1b73593-2445-421a-af42-359114d6c536
                login: string
                role: admin
                createdAt: 1775287579998
                updatedAt: 1775288465881
        '400':
          description: Bad request. User id is invalid (not uuid)
        '403':
          description: oldPassword is wrong
        '404':
          description: User not found
      tags:
        - Users
    delete:
      operationId: UserController_remove
      summary: Deletes user
      description: >-
        Deletes user by ID. Sets authorId to null on articles, deletes user's
        comments
      parameters:
        - name: id
          required: true
          in: path
          description: User id, format UUID v4
          schema: {}
      responses:
        '204':
          description: The user has been deleted
          example: ''
        '400':
          description: Bad request. User id is invalid (not uuid)
        '404':
          description: User not found
      tags:
        - Users
  /article:
    post:
      operationId: ArticleController_create
      summary: Create article
      description: Creates a new article
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateArticleDto'
      responses:
        '201':
          description: The article has been created
          content:
            application/json:
              example:
                id: 0e2f864e-8611-4e41-9d49-1c94b1df5c95
                title: string
                content: string
                status: draft
                authorId: b1b73593-2445-421a-af42-359114d6c536
                categoryId: f3d2f4c6-5376-48df-b4a7-9fe825559db9
                tags:
                  - nestjs
                  - typescript
                  - backend
                createdAt: 1775299578964
                updatedAt: 1775299578964
        '400':
          description: Bad request. Body does not contain required fields
      tags:
        - Articles
    get:
      operationId: ArticleController_findAll
      summary: Get all articles
      description: >-
        Gets all articles. Supports filtering by status, categoryId, and tag,
        pagination and sorting
      parameters:
        - name: page
          required: false
          in: query
          description: Page number (starting from 1)
          schema:
            example: 1
            type: number
        - name: limit
          required: false
          in: query
          description: Number of items per page
          schema:
            example: 10
            type: number
        - name: status
          required: false
          in: query
          description: Filter by article status
          schema:
            example: draft
            enum:
              - draft
              - published
              - archived
            type: string
        - name: categoryId
          required: false
          in: query
          description: Filter by categoryId
          schema:
            example: f3d2f4c6-5376-48df-b4a7-9fe825559db9
            type: string
        - name: tag
          required: false
          in: query
          description: Filter by tag
          schema:
            example: string
            type: string
        - name: sortBy
          required: false
          in: query
          description: The field to sort by
          schema:
            example: title
            enum:
              - id
              - title
              - content
              - status
              - authorId
              - categoryId
              - createdAt
              - updatedAt
            type: string
        - name: order
          required: false
          in: query
          description: Sorting direction
          schema:
            example: DESC
            enum:
              - ASC
              - DESC
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              examples:
                Without pagination:
                  value:
                    - id: 0e2f864e-8611-4e41-9d49-1c94b1df5c95
                      title: string
                      content: string
                      status: draft
                      authorId: b1b73593-2445-421a-af42-359114d6c536
                      categoryId: f3d2f4c6-5376-48df-b4a7-9fe825559db9
                      tags:
                        - nestjs
                        - typescript
                        - backend
                      createdAt: 1775299578964
                      updatedAt: 1775299578964
                  description: Without page and limit query parameters
                With pagination:
                  value:
                    total: 1
                    page: 1
                    limit: 10
                    data:
                      - id: 0e2f864e-8611-4e41-9d49-1c94b1df5c95
                        title: string
                        content: string
                        status: draft
                        authorId: b1b73593-2445-421a-af42-359114d6c536
                        categoryId: f3d2f4c6-5376-48df-b4a7-9fe825559db9
                        tags:
                          - nestjs
                          - typescript
                          - backend
                        createdAt: 1775299578964
                        updatedAt: 1775299578964
                  description: With page and limit query parameters
        '400':
          description: Bad request. Wrong query parameters (hacker scope)
      tags:
        - Articles
  /article/{id}:
    get:
      operationId: ArticleController_findOne
      summary: Get single article by id
      description: Get single article by id
      parameters:
        - name: id
          required: true
          in: path
          description: Article id, format UUID v4
          schema: {}
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              example:
                id: 0e2f864e-8611-4e41-9d49-1c94b1df5c95
                title: string
                content: string
                status: draft
                authorId: b1b73593-2445-421a-af42-359114d6c536
                categoryId: f3d2f4c6-5376-48df-b4a7-9fe825559db9
                tags:
                  - nestjs
                  - typescript
                  - backend
                createdAt: 1775299578964
                updatedAt: 1775299578964
        '400':
          description: Bad request. Article id is invalid (not uuid)
        '404':
          description: Article not found
      tags:
        - Articles
    put:
      operationId: ArticleController_update
      summary: Update article information
      description: Updates article by ID
      parameters:
        - name: id
          required: true
          in: path
          description: Article id, format UUID v4
          schema: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateArticleDto'
      responses:
        '200':
          description: The article has been updated
          content:
            application/json:
              example:
                id: 0e2f864e-8611-4e41-9d49-1c94b1df5c95
                title: string
                content: string
                status: draft
                authorId: b1b73593-2445-421a-af42-359114d6c536
                categoryId: f3d2f4c6-5376-48df-b4a7-9fe825559db9
                tags:
                  - nestjs
                  - typescript
                  - backend
                createdAt: 1775299578964
                updatedAt: 1775300238971
        '400':
          description: Bad request. Article id is invalid (not uuid)
        '404':
          description: Article not found
      tags:
        - Articles
    delete:
      operationId: ArticleController_remove
      summary: Deletes article
      description: Deletes article. Deletes all associated comments.
      parameters:
        - name: id
          required: true
          in: path
          description: Article id, format UUID v4
          schema: {}
      responses:
        '204':
          description: The article has been deleted
          example: ''
        '400':
          description: Bad request. Article id is invalid (not uuid)
        '404':
          description: Article not found
      tags:
        - Articles
  /category:
